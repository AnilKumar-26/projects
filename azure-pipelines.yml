trigger:
  branches:
    include:
      - main
  paths:
    include:
      - 02-azure-devops-pipeline/*

pool:
  vmImage: ubuntu-latest

variables:
  acrName: 'devopslabacr2026'
  imageName: 'flask-api'
  appName: 'flask-devops-app-2026'
  workingDir: '02-azure-devops-pipeline'

stages:
  - stage: Build
    jobs:
      - job: BuildImage
        steps:
          - script: |
              cd $(workingDir)
              docker build -t $(acrName).azurecr.io/$(imageName):$(Build.BuildId) .
            displayName: 'Build Docker image'

  - stage: Push
    dependsOn: Build
    jobs:
      - job: PushToACR
        steps:
          - task: Docker@2
            displayName: 'Build and push image to ACR'
            inputs:
              containerRegistry: 'acr-docker-connection'
              repository: '$(imageName)'
              command: 'buildAndPush'
              Dockerfile: '$(workingDir)/Dockerfile'
              buildContext: '$(workingDir)'
              tags: '$(Build.BuildId)'
  - stage: Scan
    dependsOn: Push
    jobs:
      - job: SonarScan
        pool: 'Default'
        steps:
          - task: SonarQubePrepare@7
            inputs:
              SonarQube: 'sonarqube-connection'
              scannerMode: 'CLI'
              configMode: 'manual'
              cliProjectKey: 'flask-api'
              cliSources: '$(workingDir)'

          - bash: |
              echo "RAW PARAMS: $SONARQUBE_SCANNER_PARAMS"
            displayName: 'DEBUG - show raw scanner params'

          - task: SonarQubeAnalyze@7
  
          - task: SonarQubePublish@7
            inputs:
              pollingTimeoutSec: '300'
          - script: |
              STATUS=$(curl -s -u $(SonarToken): "http://localhost:9000/api/qualitygates/project_status?projectKey=flask-api" | grep -o '"status":"[A-Z]*"' | head -1 | cut -d'"' -f4)
              echo "Quality Gate Status: $STATUS"
              if [ "$STATUS" != "OK" ]; then
                echo "##vso[task.logissue type=error]Quality Gate failed with status: $STATUS"
                exit 1
              fi
            displayName: 'Enforce Quality Gate'
  - stage: Deploy
    dependsOn: Scan
    jobs:
      - deployment: DeployToAppService
        environment: 'production'
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebAppContainer@1
                  displayName: 'Deploy to Azure App Service'
                  inputs:
                    azureSubscription: 'azure-devops-lab-connection'
                    appName: '$(appName)'
                    imageName: '$(acrName).azurecr.io/$(imageName):$(Build.BuildId)'